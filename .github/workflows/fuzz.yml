name: Fuzz regression

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  regression:
    name: libFuzzer corpus regression
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kitware
        uses: ./.github/actions/kitware-apt

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libstdc++-14-dev python3-dev

      - name: Install LLVM 21
        run: bash ci/install_llvm.sh 21

      - name: Build fuzz targets
        run: |
          cmake --preset fuzz
          cmake --build --preset fuzz --parallel

      - name: Regression - arena_rpc
        run: |
          mkdir -p fuzz/corpus/crashes
          ./build/fuzz/fuzz/tachyon_fuzz_arena_rpc \
            fuzz/corpus/arena_rpc \
            -runs=0 \
            -artifact_prefix=fuzz/corpus/crashes/

      - name: Regression - arena_rx
        run: |
          mkdir -p fuzz/corpus/crashes
          ./build/fuzz/fuzz/tachyon_fuzz_arena_rx \
            fuzz/corpus/arena_rx \
            -runs=0 \
            -artifact_prefix=fuzz/corpus/crashes/

      - name: Regression - arena_rx_batch
        run: |
          ./build/fuzz/fuzz/tachyon_fuzz_arena_rx_batch \
            fuzz/corpus/arena_rx_batch \
            -runs=0 \
            -artifact_prefix=fuzz/corpus/crashes/

      - name: Regression - arena_tx
        run: |
          mkdir -p fuzz/corpus/crashes
          ./build/fuzz/fuzz/tachyon_fuzz_arena_tx \
            fuzz/corpus/arena_tx \
            -runs=0 \
            -artifact_prefix=fuzz/corpus/crashes/

      - name: Regression - header_parser
        run: |
          ./build/fuzz/fuzz/tachyon_fuzz_header_parser \
            fuzz/corpus/header_parser \
            -runs=0 \
            -artifact_prefix=fuzz/corpus/crashes/

      - name: Regression - shared memory attach
        run: |
          mkdir -p fuzz/corpus/crashes
          ./build/fuzz/fuzz/tachyon_fuzz_shm_attach \
            fuzz/corpus/shm_attach \
            -runs=0 \
            -artifact_prefix=fuzz/corpus/crashes/

      - name: Regression - toctou
        run: |
          ./build/fuzz/fuzz/tachyon_fuzz_toctou \
            fuzz/corpus/toctou \
            -runs=0 \
            -artifact_prefix=fuzz/corpus/crashes/

      - name: Upload crashes
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes-${{ github.sha }}
          path: fuzz/corpus/crashes/
          if-no-files-found: ignore
