name: Fuzz regression

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  regression:
    name: libFuzzer corpus regression
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kitware APT repository
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ca-certificates gpg wget
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | \
            gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' | \
            sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
          kitware-archive-keyring cmake ninja-build libstdc++-14-dev \
          python3-dev

      - name: Install LLVM 21
        run: bash ci/install_llvm.sh 21

      - name: Build fuzz targets
        run: |
          cmake --preset fuzz
          cmake --build --preset fuzz

      - name: Regression - arena_rx
        run: |
          mkdir -p fuzz/corpus/crashes
          ./build/fuzz/fuzz/tachyon_fuzz_arena_rx \
            fuzz/corpus/arena_rx \
            -runs=0 \
            -artifact_prefix=fuzz/corpus/crashes/

      - name: Regression - arena_rx_batch
        run: |
          ./build/fuzz/fuzz/tachyon_fuzz_arena_rx_batch \
            fuzz/corpus/arena_rx_batch \
            -runs=0 \
            -artifact_prefix=fuzz/corpus/crashes/

      - name: Regression - header_parser
        run: |
          ./build/fuzz/fuzz/tachyon_fuzz_header_parser \
            fuzz/corpus/header_parser \
            -runs=0 \
            -artifact_prefix=fuzz/corpus/crashes/

      - name: Regression - toctou
        run: |
          ./build/fuzz/fuzz/tachyon_fuzz_toctou \
            fuzz/corpus/toctou \
            -runs=0 \
            -artifact_prefix=fuzz/corpus/crashes/

      - name: Upload crashes
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes-${{ github.sha }}
          path: fuzz/corpus/crashes/
          if-no-files-found: ignore
