name: ClusterFuzzLite

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - main
      - development
  schedule:
    - cron: '0 */6 * * *'
    - cron: '0 3 * * 0'
    - cron: '0 4 * * 0'

permissions:
  contents: read

jobs:
  batch:
    name: Batch Fuzzing (${{ matrix.sanitizer }})
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || ((github.event_name == 'schedule' && github.event.schedule == '0 */6 * * *'))
    concurrency:
      group: cfl-batch-${{ github.ref_name }}-${{ matrix.sanitizer }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [ address, memory, undefined ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        with:
          sanitizer: ${{ matrix.sanitizer }}

      - name: Run Fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: '600'
          mode: 'batch'
          sanitizer: ${{ matrix.sanitizer }}

  ci-fuzzing:
    name: CI Fuzzing (${{ matrix.sanitizer }})
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    concurrency:
      group: cfl-ci-${{ github.ref }}-${{ matrix.sanitizer }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [ address, memory, undefined ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        with:
          sanitizer: ${{ matrix.sanitizer }}

      - name: Run Fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: '300'
          mode: 'code-change'
          sanitizer: ${{ matrix.sanitizer }}

  coverage:
    name: Coverage Report
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule' && github.event.schedule == '0 4 * * 0'
    concurrency:
      group: cfl-coverage

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        with:
          sanitizer: 'coverage'

      - name: Run Fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: 'coverage'
          sanitizer: 'coverage'

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: 'coverage-report'
          path: './out/report'
          retention-days: 7

  prune:
    name: Prune Corpus (${{ matrix.sanitizer }})
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0'
    concurrency:
      group: cfl-prune-${{ matrix.sanitizer }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [ address, memory, undefined ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        with:
          sanitizer: ${{ matrix.sanitizer }}

      - name: Run Fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: 'prune'
          sanitizer: ${{ matrix.sanitizer }}
