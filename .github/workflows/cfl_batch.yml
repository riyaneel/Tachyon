name: ClusterFuzzLite Batch

on:
  push:
    branches:
      - development
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read

jobs:
  batch:
    name: Batch Fuzzing (${{ matrix.sanitizer }})
    runs-on: ubuntu-24.04
    concurrency:
      group: cfl-batch-${{ github.ref_name }}-${{ matrix.sanitizer }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [ address, memory, undefined ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        with:
          sanitizer: ${{ matrix.sanitizer }}

      - name: Run Fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: '600'
          mode: 'batch'
          sanitizer: ${{ matrix.sanitizer }}
