name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  cpp:
    name: C++ (${{ matrix.compiler }}, ${{ matrix.build_type }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [ gcc, clang ]
        build_type: [ Debug, Release ]

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (GCC)
        if: matrix.compiler == 'gcc'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
          cmake ninja-build libgtest-dev libbenchmark-dev \
          gcc-14 g++-14

      - name: Install dependencies (Clang)
        if: matrix.compiler == 'clang'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build libgtest-dev libbenchmark-dev \
            clang-18 libstdc++-14-dev

      - name: Configure (GCC)
        if: matrix.compiler == 'gcc'
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_C_COMPILER=gcc-14

      - name: Configure (Clang)
        if: matrix.compiler == 'clang'
        run: |
          cmake -S . -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_CXX_COMPILER=clang++-18 \
          -DCMAKE_C_COMPILER=clang-18 \
          -DCMAKE_CXX_FLAGS="-D__cpp_concepts=202002L -Wno-builtin-macro-redefined"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel 4

  python:
    name: Python bindings
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 python3-dev python3-venv
          sudo mkdir -p /usr/local/include/dlpack
          sudo curl -fsSL -o /usr/local/include/dlpack/dlpack.h \
            https://raw.githubusercontent.com/dmlc/dlpack/main/include/dlpack/dlpack.h

      - name: Install and test
        run: |
          python3 -m venv .venv
          CXX=g++-14 CC=gcc-14 .venv/bin/pip install ./bindings/python pytest
          .venv/bin/pytest bindings/python/tests/ -v

  rust:
    name: Rust bindings
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc-14 g++-14

      - name: Test
        env:
          CXX: g++-14
          CC: gcc-14
        run: cargo test
        working-directory: bindings/rust