name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp:
    name: C++ (${{ matrix.compiler }}, ${{ matrix.build_type }}, x86-64)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [ gcc, clang ]
        build_type: [ debug, release ]
    env:
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup ccache
        uses: ./.github/actions/setup-ccache
        with:
          build_type: ${{ matrix.build_type }}
          compiler: ${{ matrix.compiler }}

      - name: Setup Kitware
        uses: ./.github/actions/kitware-apt

      - name: Install Toolchain (GCC)
        if: matrix.compiler == 'gcc'
        uses: ./.github/actions/gcc-installer
        with:
          version: '16'

      - name: Install Toolchain (Clang)
        if: matrix.compiler == 'clang'
        run: bash ci/setup/install_llvm.sh 21

      - name: Configure (${{ matrix.compiler }}-${{ matrix.build_type}})
        run: |
          cmake --preset ${{ matrix.compiler }}-${{ matrix.build_type}} -DTACHYON_ENABLE_BENCH=OFF

      - name: Build (${{ matrix.compiler }}-${{ matrix.build_type}})
        run: cmake --build --preset ${{ matrix.compiler }}-${{ matrix.build_type}}

      - name: Test
        run: ctest --test-dir build/${{ matrix.compiler }}-${{ matrix.build_type}}/test --output-on-failure --parallel 4

  cpp_aarch64:
    name: C++ (clang, release, aarch64)
    runs-on: ubuntu-24.04
    env:
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup ccache
        uses: ./.github/actions/setup-ccache

      - name: Setup Kitware
        uses: ./.github/actions/kitware-apt

      - name: Install aarch64 toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libstdc++-14-dev-arm64-cross

      - name: Install LLVM 21
        run: bash ci/setup/install_llvm.sh 21

      - name: Configure
        run: cmake --preset clang-aarch64-release -DTACHYON_ENABLE_BENCH=OFF

      - name: Build
        run: cmake --build --preset clang-aarch64-release --target tachyon --parallel

      - name: Check ELF target
        run: |
          file build/clang-aarch64-release/core/libtachyon.so | grep -q "aarch64" || \
            (echo "Error: not an aarch64 elf." && exit 1)

  cpp_asan:
    name: C++ ASan (Clang 21, Debug, x86-64)
    runs-on: ubuntu-24.04
    env:
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup ccache
        uses: ./.github/actions/setup-ccache

      - name: Setup Kitware
        uses: ./.github/actions/kitware-apt

      - name: Install LLVM 21
        run: bash ci/setup/install_llvm.sh 21

      - name: Configure
        run: cmake --preset asan -DTACHYON_ENABLE_BENCH=OFF

      - name: Build
        run: cmake --build --preset asan --parallel

      - name: Test
        env:
          ASAN_OPTIONS: "detect_leaks=1:abort_on_error=1:print_stacktrace=1"
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1:print_summary=1"
        run: ctest --test-dir build/asan/test --output-on-failure --parallel 1

  cpp_msan:
    name: C++ MSan (Clang 21, Debug, x86-64)
    runs-on: ubuntu-24.04
    env:
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup ccache
        uses: ./.github/actions/setup-ccache

      - name: Setup Kitware
        uses: ./.github/actions/kitware-apt

      - name: Install LLVM 21
        run: bash ci/setup/install_llvm.sh 21

      - name: Build Instrumented libc++
        run: bash ci/setup/build_msan_libcxx.sh 21

      - name: Configure
        run: cmake --preset msan -DTACHYON_ENABLE_BENCH=OFF

      - name: Build
        run: cmake --build --preset msan --parallel

      - name: Test
        env:
          MSAN_OPTIONS: "abort_on_error=1:print_stacktrace=1"
        run: ctest --test-dir build/msan/test --output-on-failure --parallel 1

  cpp_tsan:
    name: C++ TSan (Clang 21, Debug, x86-64)
    runs-on: ubuntu-24.04
    env:
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup ccache
        uses: ./.github/actions/setup-ccache

      - name: Setup Kitware
        uses: ./.github/actions/kitware-apt

      - name: Install LLVM 21
        run: bash ci/setup/install_llvm.sh 21

      - name: Configure
        run: cmake --preset tsan -DTACHYON_ENABLE_BENCH=OFF

      - name: Build
        run: cmake --build --preset tsan --parallel

      - name: Test
        env:
          TSAN_OPTIONS: "halt_on_error=1 second_deadlock_stack=1 history_size=5"
        run: ctest --test-dir build/tsan/test --output-on-failure --parallel 1

  cpp_macos:
    name: C++ macOS (${{ matrix.runner }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]
        build_type: [ debug, release ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure
        run: cmake --preset macos-${{ matrix.build_type }} -DTACHYON_ENABLE_BENCH=OFF

      - name: Build
        run: cmake --build --preset macos-${{ matrix.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build/macos-${{ matrix.build_type }}/test --output-on-failure --parallel 4

  cpp_wasm:
    name: C++ (Emscripten, ${{ matrix.build_type }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build_type: [ debug, release ]
    env:
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup ccache
        uses: ./.github/actions/setup-ccache

      - name: Setup Kitware
        uses: ./.github/actions/kitware-apt

      - name: Install LLVM 21
        run: bash ci/setup/install_llvm.sh 21

      - name: Setup Emscripten
        uses: ./.github/actions/setup-emsdk

      - name: Configure
        run: cmake --preset emscripten-${{ matrix.build_type }}

      - name: Build
        run: cmake --build --preset emscripten-${{ matrix.build_type }}

      - name: Check WASM artefacts
        run: |
          ls -lh build/emscripten-${{ matrix.build_type }}/core/libtachyon.a || exit 1
          ls -lh build/emscripten-${{ matrix.build_type }}/core/tachyon.js || exit 1
          ls -lh build/emscripten-${{ matrix.build_type }}/core/tachyon.wasm || exit 1

  cpp_format_check:
    name: C++ Format Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kitware
        uses: ./.github/actions/kitware-apt

      - name: Install LLVM 21
        run: bash ci/setup/install_llvm.sh 21

      - name: Install Clang Format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-format-21

      - name: Format Check
        run: find core/ benchmark/ test/ fuzz/ tools/ -name '*.cpp' -o -name '*.hpp' | xargs clang-format-21 --dry-run --Werror

  tachyon_top:
    name: Tachyon Top
    runs-on: ubuntu-24.04
    env:
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup ccache
        uses: ./.github/actions/setup-ccache

      - name: Setup Kitware
        uses: ./.github/actions/kitware-apt

      - name: Install LLVM 21
        run: bash ci/setup/install_llvm.sh 21

      - name: Configure
        run: cmake --preset tachyon-top

      - name: Build
        run: cmake --build --preset tachyon-top --parallel

      - name: Smoke test
        run: |
          OUTPUT=$(./build/tachyon-top/tools/tachyon-top/tachyon_top --json)
          echo "Raw output: $OUTPUT"
          PARSED=$(echo "$OUTPUT" | jq -c '.')
          if [ "$PARSED" != "[]" ]; then
            echo "::error::Smoke test failed! Expected '[]', but got '$PARSED'"
            exit 1
          fi
          echo "Smoke test passed successfully."

  python:
    name: Python bindings (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Compiler
        uses: ./.github/actions/gcc-installer
        with:
          version: '16'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3-dev python3-venv
          sudo mkdir -p /usr/local/include/dlpack
          sudo curl -fsSL -o /usr/local/include/dlpack/dlpack.h \
            https://raw.githubusercontent.com/dmlc/dlpack/main/include/dlpack/dlpack.h

      - name: Install and test
        run: |
          python3 -m venv .venv
          CXX=g++-16 CC=gcc-16 .venv/bin/pip install ./bindings/python pytest
          .venv/bin/pytest bindings/python/tests/ -v

  python_macos:
    name: Python bindings (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install and test
        run: |
          python3 -m venv .venv
          .venv/bin/pip install ./bindings/python pytest
          .venv/bin/pytest bindings/python/tests/ -v

  rust:
    name: Rust bindings (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Compiler
        uses: ./.github/actions/gcc-installer
        with:
          version: '16'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        env:
          CXX: g++-16
          CC: gcc-16
        run: cargo test
        working-directory: bindings/rust

      - name: Check WASM target
        run: |
          rustup target add wasm32-unknown-unknown
          cargo check -p tachyon-ipc --target wasm32-unknown-unknown
        working-directory: bindings/rust

  rust_macos:
    name: Rust bindings (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test
        working-directory: bindings/rust

  go:
    name: Go bindings (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Compiler
        uses: ./.github/actions/gcc-installer
        with:
          version: '16'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache-dependency-path: 'bindings/go'

      - name: Vendor C++ core
        run: bash ci/setup/vendor.sh go

      - name: Go Test
        env:
          CXX: g++-16
          CC: gcc-16
          CGO_ENABLED: "1"
        working-directory: bindings/go
        run: go test -v -count=1 -timeout=120s ./tachyon/...

      - name: Go Vet
        env:
          CXX: g++-16
          CC: gcc-16
          CGO_ENABLED: "1"
        working-directory: bindings/go
        run: go vet ./tachyon/...

  go_macos:
    name: Go bindings (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache-dependency-path: 'bindings/go'

      - name: Vendor C++ core
        run: bash ci/setup/vendor.sh go

      - name: Go Test
        env:
          CGO_ENABLED: "1"
        working-directory: bindings/go
        run: go test -v -count=1 -timeout=120s ./tachyon/...

      - name: Go Vet
        env:
          CGO_ENABLED: "1"
        working-directory: bindings/go
        run: go vet ./tachyon/...

  java:
    name: Java bindings (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kitware
        uses: ./.github/actions/kitware-apt

      - name: Install LLVM 21
        run: bash ci/setup/install_llvm.sh 21

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
          cache-dependency-path: |
            bindings/java/*.gradle*
            bindings/java/**/gradle-wrapper.properties

      - name: Vendor C++ core
        run: bash ci/setup/vendor.sh java

      - name: Build Native library
        env:
          CC: clang-21
          CXX: clang++-21
        run: |
          cmake --preset clang-release -DTACHYON_ENABLE_BENCH=OFF
          cmake --build --preset clang-release --parallel
          cmake --build --preset clang-release --target tachyon_java_resources

      - name: Gradle Test
        working-directory: bindings/java
        run: ./gradlew test --no-daemon

  java_macos:
    name: Java bindings (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
          cache-dependency-path: |
            bindings/java/*.gradle*
            bindings/java/**/gradle-wrapper.properties

      - name: Vendor C++ core
        run: bash ci/setup/vendor.sh java

      - name: Build Native library
        run: |
          cmake --preset macos-release -DTACHYON_ENABLE_BENCH=OFF
          cmake --build --preset macos-release --parallel
          cmake --build --preset macos-release --target tachyon_java_resources

      - name: Gradle Test
        working-directory: bindings/java
        run: ./gradlew test --no-daemon

  kotlin:
    name: Kotlin bindings (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kitware
        uses: ./.github/actions/kitware-apt

      - name: Install LLVM 21
        run: bash ci/setup/install_llvm.sh 21

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
          cache-dependency-path: |
            bindings/kotlin/*.gradle*
            bindings/kotlin/**/gradle-wrapper.properties

      - name: Vendor C++ core
        run: bash ci/setup/vendor.sh java

      - name: Build Native library
        env:
          CC: clang-21
          CXX: clang++-21
        run: |
          cmake --preset clang-release -DTACHYON_ENABLE_BENCH=OFF
          cmake --build --preset clang-release --parallel
          cmake --build --preset clang-release --target tachyon_java_resources

      - name: Gradle Test
        working-directory: bindings/kotlin
        run: ./gradlew test --no-daemon

  kotlin_macos:
    name: Kotlin bindings (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
          cache-dependency-path: |
            bindings/kotlin/*.gradle*
            bindings/kotlin/**/gradle-wrapper.properties

      - name: Vendor C++ core
        run: bash ci/setup/vendor.sh java

      - name: Build Native library
        run: |
          cmake --preset macos-release -DTACHYON_ENABLE_BENCH=OFF
          cmake --build --preset macos-release --parallel
          cmake --build --preset macos-release --target tachyon_java_resources

      - name: Gradle Test
        working-directory: bindings/kotlin
        run: ./gradlew test --no-daemon

  nodejs:
    name: Node.js bindings Linux (Node ${{ matrix.node-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node-version: [ 20, 22, 24 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kitware
        uses: ./.github/actions/kitware-apt

      - name: Install LLVM 21
        run: bash ci/setup/install_llvm.sh 21

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: bindings/node/package-lock.json

      - name: Vendor C++ core
        run: bash ci/setup/vendor.sh node

      - name: Install dependencies & build native library
        working-directory: bindings/node
        env:
          CC: clang-21
          CXX: clang++-21
        run: npm install && npm run build:native

      - name: Type check
        working-directory: bindings/node
        run: npx tsc --noEmit

      - name: Format check
        working-directory: bindings/node
        run: npm run format:check

      - name: Lint check
        working-directory: bindings/node
        run: npm run lint

      - name: Build TypeScript
        working-directory: bindings/node
        run: npm run build:ts

      - name: Tests
        working-directory: bindings/node
        run: npm test

  nodejs_browser_wasm:
    name: Browser WASM tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node only serves files and drives CDP here; Chromium is the target under test.
          # Use Node 24 for the built-in WebSocket client.
          node-version: 24
          cache: 'npm'
          cache-dependency-path: bindings/node/package-lock.json

      - name: Install dependencies
        working-directory: bindings/node
        run: npm install --ignore-scripts

      - name: Check Chromium
        run: /usr/bin/chromium --version

        # - name: Browser WASM tests
        # working-directory: bindings/node
        # env:
        # CHROMIUM_BIN: /usr/bin/chromium
        # Do not run build:wasm in this test job. The generated WASM bindings are
        # committed, and CI should validate the committed artifacts instead of
        # regenerating them and potentially masking a stale generated-code diff.
        # run: npm run test:browser

  nodejs_macos:
    name: Node.js bindings ${{ matrix.runner }} (Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]
        node-version: [ 20, 22, 24 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: bindings/node/package-lock.json

      - name: Vendor C++ core
        run: bash ci/setup/vendor.sh node

      - name: Install dependencies & build native library
        working-directory: bindings/node
        run: npm install && npm run build:native

      - name: Type check
        working-directory: bindings/node
        run: npx tsc --noEmit

      - name: Format check
        working-directory: bindings/node
        run: npm run format:check

      - name: Lint check
        working-directory: bindings/node
        run: npm run lint

      - name: Build TypeScript
        working-directory: bindings/node
        run: npm run build:ts

      - name: Tests
        working-directory: bindings/node
        run: npm test

  csharp_linux:
    name: C# Bindings (Linux)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kitware
        uses: ./.github/actions/kitware-apt

      - name: Install LLVM 21
        run: bash ci/setup/install_llvm.sh 21

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.x
            10.x

      - name: Vendor C++ core
        run: bash ci/setup/vendor.sh c#

      - name: Build native library
        env:
          CC: clang-21
          CXX: clang++-21
        run: |
          cmake --preset clang-release -DTACHYON_ENABLE_BENCH=OFF
          cmake --build --preset clang-release --parallel
          mkdir -p bindings/csharp/src/TachyonIpc/runtimes/linux-x64/native
          cp build/clang-release/core/libtachyon.so bindings/csharp/src/TachyonIpc/runtimes/linux-x64/native/

      - name: Build
        working-directory: bindings/csharp
        run: dotnet build src/TachyonIpc/

      - name: Test
        working-directory: bindings/csharp
        run: dotnet test tests/TachyonIpc/

  csharp_macos:
    name: C# Bindings (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.x
            10.x

      - name: Vendor C++ core
        run: bash ci/setup/vendor.sh c#

      - name: Build Native library
        run: |
          cmake --preset macos-release -DTACHYON_ENABLE_BENCH=OFF
          cmake --build --preset macos-release --parallel
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then 
            RID="osx-arm64"; 
          else 
            RID="osx-x64";
          fi
          mkdir -p bindings/csharp/src/TachyonIpc/runtimes/${RID}/native
          cp build/macos-release/core/libtachyon.dylib bindings/csharp/src/TachyonIpc/runtimes/${RID}/native/

      - name: Build
        working-directory: bindings/csharp
        run: dotnet build src/TachyonIpc/

      - name: Test
        working-directory: bindings/csharp
        run: dotnet test tests/TachyonIpc/
