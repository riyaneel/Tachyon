name: CI

on:
  push:
  pull_request:

jobs:
  cpp:
    name: C++ (${{ matrix.compiler }}, ${{ matrix.build_type }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [ gcc, clang ]
        build_type: [ Debug, Release ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies (GCC)
        if: matrix.compiler == 'gcc'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
          cmake ninja-build libgtest-dev libbenchmark-dev \
          gcc-14 g++-14

      - name: Install dependencies (Clang)
        if: matrix.compiler == 'clang'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build libgtest-dev libbenchmark-dev \
            clang-18 libstdc++-14-dev

      - name: Configure (GCC)
        if: matrix.compiler == 'gcc'
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_C_COMPILER=gcc-14

      - name: Configure (Clang)
        if: matrix.compiler == 'clang'
        run: |
          cmake -S . -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_CXX_COMPILER=clang++-18 \
          -DCMAKE_C_COMPILER=clang-18 \
          -DCMAKE_CXX_FLAGS="-D__cpp_concepts=202002L -Wno-builtin-macro-redefined"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        env:
          ASAN_OPTIONS: "detect_leaks=1:abort_on_error=1:print_stacktrace=1"
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1:print_summary=1"
        run: ctest --test-dir build --output-on-failure --parallel 4

  cpp_tsan:
    name: C++ TSan (clang-18, Debug)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build libgtest-dev libbenchmark-dev \
            clang-18 libstdc++-14-dev

      - name: Configure
        run: |
          cmake -S . -B build-tsan \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_FLAGS="-D__cpp_concepts=202002L -Wno-builtin-macro-redefined" \
            -DTACHYON_SANITIZER=tsan

      - name: Build
        run: cmake --build build-tsan --parallel

      - name: Test
        env:
          TSAN_OPTIONS: >-
            suppressions=${{ github.workspace }}/tsan.supp
            halt_on_error=1
            second_deadlock_stack=1
            history_size=5
        run: ctest --test-dir build-tsan --output-on-failure --parallel 1

  cpp_macos:
    name: C++ macOS (${{ matrix.runner }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]
        build_type: [ Debug, Release ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install cmake ninja googletest google-benchmark

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_PREFIX_PATH=$(brew --prefix) \
            -DTACHYON_SANITIZER=none

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel 4

  python:
    name: Python bindings (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 python3-dev python3-venv
          sudo mkdir -p /usr/local/include/dlpack
          sudo curl -fsSL -o /usr/local/include/dlpack/dlpack.h \
            https://raw.githubusercontent.com/dmlc/dlpack/main/include/dlpack/dlpack.h

      - name: Install and test
        run: |
          python3 -m venv .venv
          CXX=g++-14 CC=gcc-14 .venv/bin/pip install ./bindings/python pytest
          .venv/bin/pytest bindings/python/tests/ -v

  python_macos:
    name: Python bindings (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install and test
        run: |
          python3 -m venv .venv
          .venv/bin/pip install ./bindings/python pytest
          .venv/bin/pytest bindings/python/tests/ -v

  rust:
    name: Rust bindings (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc-14 g++-14

      - name: Test
        env:
          CXX: g++-14
          CC: gcc-14
        run: cargo test
        working-directory: bindings/rust

  rust_macos:
    name: Rust bindings (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test
        working-directory: bindings/rust

  go:
    name: Go bindings (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc-14 g++-14

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: Vendor C++ core
        run: bash ci/vendor/go.sh

      - name: Go Test
        env:
          CXX: g++-14
          CC: gcc-14
          CGO_ENABLED: "1"
        working-directory: bindings/go
        run: go test -v -count=1 -timeout=120s ./tachyon/...

      - name: Go Vet
        env:
          CXX: g++-14
          CC: gcc-14
          CGO_ENABLED: "1"
        working-directory: bindings/go
        run: go vet ./tachyon/...

  go_macos:
    name: Go bindings (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: Vendor C++ core
        run: bash ci/vendor/go.sh

      - name: Go Test
        env:
          CGO_ENABLED: "1"
        working-directory: bindings/go
        run: go test -v -count=1 -timeout=120s ./tachyon/...

      - name: Go Vet
        env:
          CGO_ENABLED: "1"
        working-directory: bindings/go
        run: go vet ./tachyon/...
