name: CI

on:
  push:
  pull_request:

jobs:
  cpp:
    name: C++ (${{ matrix.compiler }}, ${{ matrix.build_type }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [ gcc, clang ]
        build_type: [ debug, release ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kitware APT repository
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ca-certificates gpg wget
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | \
            gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' | \
            sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null

      - name: Install dependencies (Common)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends kitware-archive-keyring cmake ninja-build

      - name: Install Toolchain (GCC)
        if: matrix.compiler == 'gcc'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc-14 g++-14

      - name: Install Toolchain (Clang)
        if: matrix.compiler == 'clang'
        run: bash ci/install_llvm.sh 21

      - name: Configure (${{ matrix.compiler }}-${{ matrix.build_type}})
        run: |
          cmake --preset ${{ matrix.compiler }}-${{ matrix.build_type}}

      - name: Build (${{ matrix.compiler }}-${{ matrix.build_type}})
        run: cmake --build --preset ${{ matrix.compiler }}-${{ matrix.build_type}}

      - name: Test
        run: ctest --test-dir build/${{ matrix.compiler }}-${{ matrix.build_type}}/test --output-on-failure --parallel 4

  cpp_asan:
    name: C++ ASan (Clang 21, Debug)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kitware APT repository
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ca-certificates gpg wget
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | \
            gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' | \
            sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends kitware-archive-keyring cmake ninja-build

      - name: Install LLVM 21
        run: bash ci/install_llvm.sh 21

      - name: Configure
        run: cmake --preset asan

      - name: Build
        run: cmake --build --preset asan --parallel

      - name: Test
        env:
          ASAN_OPTIONS: "detect_leaks=1:abort_on_error=1:print_stacktrace=1"
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1:print_summary=1"
        run: ctest --test-dir build/asan/test --output-on-failure --parallel 1

  cpp_msan:
    name: C++ MSan (Clang 21, Debug)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kitware APT repository
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ca-certificates gpg wget
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | \
            gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' | \
            sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends kitware-archive-keyring cmake ninja-build

      - name: Install LLVM 21
        run: bash ci/install_llvm.sh 21

      - name: Build Instrumented libc++
        run: bash ci/build_msan_libcxx.sh 21

      - name: Configure
        run: cmake --preset msan

      - name: Build
        run: cmake --build --preset msan --parallel

      - name: Test
        env:
          MSAN_OPTIONS: "abort_on_error=1:print_stacktrace=1"
        run: ctest --test-dir build/msan/test --output-on-failure --parallel 1

  cpp_tsan:
    name: C++ TSan (Clang 21, Debug)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kitware APT repository
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ca-certificates gpg wget
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | \
            gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' | \
            sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends kitware-archive-keyring cmake ninja-build

      - name: Install LLVM 21
        run: bash ci/install_llvm.sh 21

      - name: Configure
        run: cmake --preset tsan

      - name: Build
        run: cmake --build --preset tsan --parallel

      - name: Test
        env:
          TSAN_OPTIONS: "suppressions=${{ github.workspace }}/tsan.supp halt_on_error=1 second_deadlock_stack=1 history_size=5"
        run: ctest --test-dir build/tsan/test --output-on-failure --parallel 1

  cpp_macos:
    name: C++ macOS (${{ matrix.runner }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]
        build_type: [ Debug, Release ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install cmake ninja googletest google-benchmark

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_PREFIX_PATH=$(brew --prefix) \
            -DTACHYON_SANITIZER=none

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build/test --output-on-failure --parallel 4

  tachyon_top:
    name: Tachyon Top
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kitware APT repository
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ca-certificates gpg wget
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | \
            gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' | \
            sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends kitware-archive-keyring cmake ninja-build

      - name: Install LLVM 21
        run: bash ci/install_llvm.sh 21

      - name: Configure
        run: cmake --preset tachyon-top

      - name: Build
        run: cmake --build --preset tachyon-top --parallel

      - name: Smoke test
        run: |
          OUTPUT=$(./build/tachyon-top/tools/tachyon-top/tachyon_top --json)
          echo "Raw output: $OUTPUT"
          PARSED=$(echo "$OUTPUT" | jq -c '.')
          if [ "$PARSED" != "[]" ]; then
            echo "::error::Smoke test failed! Expected '[]', but got '$PARSED'"
            exit 1
          fi
          echo "Smoke test passed successfully."

  python:
    name: Python bindings (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 python3-dev python3-venv
          sudo mkdir -p /usr/local/include/dlpack
          sudo curl -fsSL -o /usr/local/include/dlpack/dlpack.h \
            https://raw.githubusercontent.com/dmlc/dlpack/main/include/dlpack/dlpack.h

      - name: Install and test
        run: |
          python3 -m venv .venv
          CXX=g++-14 CC=gcc-14 .venv/bin/pip install ./bindings/python pytest
          .venv/bin/pytest bindings/python/tests/ -v

  python_macos:
    name: Python bindings (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install and test
        run: |
          python3 -m venv .venv
          .venv/bin/pip install ./bindings/python pytest
          .venv/bin/pytest bindings/python/tests/ -v

  rust:
    name: Rust bindings (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc-14 g++-14

      - name: Test
        env:
          CXX: g++-14
          CC: gcc-14
        run: cargo test
        working-directory: bindings/rust

  rust_macos:
    name: Rust bindings (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test
        working-directory: bindings/rust

  go:
    name: Go bindings (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc-14 g++-14

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: Vendor C++ core
        run: bash ci/vendor.sh go

      - name: Go Test
        env:
          CXX: g++-14
          CC: gcc-14
          CGO_ENABLED: "1"
        working-directory: bindings/go
        run: go test -v -count=1 -timeout=120s ./tachyon/...

      - name: Go Vet
        env:
          CXX: g++-14
          CC: gcc-14
          CGO_ENABLED: "1"
        working-directory: bindings/go
        run: go vet ./tachyon/...

  go_macos:
    name: Go bindings (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: Vendor C++ core
        run: bash ci/vendor.sh go

      - name: Go Test
        env:
          CGO_ENABLED: "1"
        working-directory: bindings/go
        run: go test -v -count=1 -timeout=120s ./tachyon/...

      - name: Go Vet
        env:
          CGO_ENABLED: "1"
        working-directory: bindings/go
        run: go vet ./tachyon/...

  java:
    name: Java bindings (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kitware APT repository
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ca-certificates gpg wget
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | \
            gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' | \
            sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends kitware-archive-keyring cmake ninja-build

      - name: Install LLVM 21
        run: bash ci/install_llvm.sh 21

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Vendor C++ core
        run: bash ci/vendor.sh java

      - name: Build Native library
        env:
          CC: clang-21
          CXX: clang++-21
        run: |
          cmake --preset clang-release
          cmake --build --preset clang-release --parallel
          cmake --build --preset clang-release --target tachyon_java_resources

      - name: Gradle Test
        working-directory: bindings/java
        run: ./gradlew test --no-daemon

  java_macos:
    name: Java bindings (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: brew install cmake ninja

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Vendor C++ core
        run: bash ci/vendor.sh java

      - name: Build Native library
        run: |
          cmake -B build/release -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build/release --parallel
          cmake --build build/release --target tachyon_java_resources

      - name: Gradle Test
        working-directory: bindings/java
        run: ./gradlew test --no-daemon

  kotlin:
    name: Kotlin bindings (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kitware APT repository
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ca-certificates gpg wget
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | \
            gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' | \
            sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends kitware-archive-keyring cmake ninja-build

      - name: Install LLVM 21
        run: bash ci/install_llvm.sh 21

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Vendor C++ core
        run: bash ci/vendor.sh java

      - name: Build Native library
        env:
          CC: clang-21
          CXX: clang++-21
        run: |
          cmake --preset clang-release
          cmake --build --preset clang-release --parallel
          cmake --build --preset clang-release --target tachyon_java_resources

      - name: Gradle Test
        working-directory: bindings/kotlin
        run: ./gradlew test --no-daemon

  kotlin_macos:
    name: Kotlin bindings (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: brew install cmake ninja

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Vendor C++ core
        run: bash ci/vendor.sh java

      - name: Build Native library
        run: |
          cmake -B build/release -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build/release --parallel
          cmake --build build/release --target tachyon_java_resources

      - name: Gradle Test
        working-directory: bindings/kotlin
        run: ./gradlew test --no-daemon

  nodejs:
    name: Node.js bindings Linux (Node ${{ matrix.node-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node-version: [ 20, 22, 24 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kitware APT repository
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ca-certificates gpg wget
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | \
            gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' | \
            sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends kitware-archive-keyring cmake ninja-build

      - name: Install LLVM 21
        run: bash ci/install_llvm.sh 21

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: bindings/node/package.json

      - name: Vendor C++ core
        run: bash ci/vendor.sh node

      - name: Install dependencies & build native library
        working-directory: bindings/node
        env:
          CC: clang-21
          CXX: clang++-21
        run: npm install && npm run build:native

      - name: Type check
        working-directory: bindings/node
        run: npx tsc --noEmit

      - name: Format check
        working-directory: bindings/node
        run: npm run check

      - name: Lint check
        working-directory: bindings/node
        run: npm run lint

      - name: Build TypeScript
        working-directory: bindings/node
        run: npm run build:ts

      - name: Tests
        working-directory: bindings/node
        run: npm test

  nodejs_macos:
    name: Node.js bindings ${{ matrix.runner }} (Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-26, macos-26-intel ]
        node-version: [ 20, 22, 24 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: brew install cmake ninja

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: bindings/node/package.json

      - name: Vendor C++ core
        run: bash ci/vendor.sh node

      - name: Install dependencies & build native library
        working-directory: bindings/node
        run: npm install && npm run build:native

      - name: Type check
        working-directory: bindings/node
        run: npx tsc --noEmit

      - name: Format check
        working-directory: bindings/node
        run: npm run check

      - name: Lint check
        working-directory: bindings/node
        run: npm run lint

      - name: Build TypeScript
        working-directory: bindings/node
        run: npm run build:ts

      - name: Tests
        working-directory: bindings/node
        run: npm test
